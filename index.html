<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suju ATM群 賭徒專屬扭蛋機</title>

    <!-- External CSS (Added version to clear cache) -->
    <link rel="stylesheet" href="style.css?v=20240318-2">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-weight: 700; color: var(--secondary-color); font-size: 1.1rem;">載入中請稍候...
        </p>
    </div>

    <div class="container">
        <h2>Suju ATM群💙賭徒專屬</h2>
        <h2>SJ日本超市線上扭蛋機</h2>

        <!-- 驗證身分區 -->
        <div id="login-section">
            <div class="input-group">
                <input type="text" id="orderId" placeholder="訂單編號（如：SJ0123456789）">
                <input type="tel" id="phone" placeholder="驗證手機號碼，避免太好玩被盜抽（？">
            </div>
            <button onclick="checkUser()">進入抽獎</button>

            <!-- 代購群資訊 -->
            <div style="margin-top: 20px; font-size: 0.85rem; color: #888;">
                <div style="font-weight: 700; color: #576574; margin-bottom: 4px;">Suju ATM | S&J代購群</div>
                <a href="https://portaly.cc/suju_atm" target="_blank"
                    style="color: var(--primary-color); text-decoration: none; border-bottom: 1px solid #74b9ff; padding-bottom: 1px;">
                    https://portaly.cc/suju_atm
                </a>
            </div>
        </div>

        <div id="draw-section" class="hidden">
            <div id="item-display"></div>

            <div class="gacha-machine" id="gacha-container">
                <!-- 背景圖層 -->
                <img src="images/svg/body_back.svg?v=2" class="layer layer-back">

                <!-- 扭蛋球圖層 (會晃動) - 使用 balls.svg 呈現彩色滿載效果 -->
                <img src="images/svg/balls.svg?v=2" class="layer layer-ball">

                <!-- 前景圖層 -->
                <img src="images/svg/body_front.svg?v=2" class="layer layer-front">

                <!-- 旋鈕 (點擊也會觸發) -->
                <div class="controller-wrapper" onclick="startDraw()">
                    <img src="images/svg/controller.svg?v=2" class="gacha-controller" id="gacha-knob">
                </div>

                <!-- 獎勵扭蛋 (掉落動畫用) -->
                <img src="images/svg/ball_single.svg?v=3" id="winning-ball" class="hidden">
            </div>

            <button id="draw-btn" onclick="startDraw()">一鍵抽完！</button>
        </div>

        <!-- 歷史紀錄與結果區 -->
        <div id="history-section" class="hidden">
            <h3 style="color: var(--secondary-color); font-size: 1.2rem; margin-bottom: 1.5rem;">🎉扭蛋抽獎紀錄🎉</h3>
            <div id="history-list"></div>
            <button onclick="location.reload()"
                style="background: var(--secondary-color); margin-top: 25px;">完成，返回首頁</button>
        </div>
    </div>

    <!-- External Logic Scripts -->
    <script src="config.js"></script>
    <script src="script.js"></script>

</body>

</html>
